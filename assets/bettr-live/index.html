<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BETTR</title>
  <style>
    @font-face {
      font-family: "Jersey 25";
      src: url("Fonts/Jersey_25/Jersey25-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: "Rajdhani";
      src: url("Fonts/Rajdhani/Rajdhani-Light.ttf") format("truetype");
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: "Rajdhani";
      src: url("Fonts/Rajdhani/Rajdhani-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: "Rajdhani";
      src: url("Fonts/Rajdhani/Rajdhani-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: "Rajdhani";
      src: url("Fonts/Rajdhani/Rajdhani-SemiBold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: "Rajdhani";
      src: url("Fonts/Rajdhani/Rajdhani-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 30%, rgba(235, 81, 96, 0.10), transparent 28%),
        radial-gradient(circle at 78% 72%, rgba(183, 153, 156, 0.08), transparent 20%),
        #000000;
      color: #f5f1f1;
      font-family: "Rajdhani", Arial, sans-serif;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      border-radius: 999px;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow-1 {
      width: 420px;
      height: 420px;
      background: rgba(235, 81, 96, 0.10);
      top: 12%;
      left: 12%;
    }
    .bg-glow-2 {
      width: 360px;
      height: 360px;
      background: rgba(183, 153, 156, 0.08);
      bottom: 8%;
      right: 10%;
    }

    .topbar {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 28px 48px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-btn {
      appearance: none;
      background: none;
      border: none;
      padding: 0;
      cursor: default;
    }
    .brand {
      font-family: "Jersey 25", Arial, sans-serif;
      font-size: 28px;
      letter-spacing: 0.12em;
      color: #ffffff;
    }
    .brand-dot { color: #eb5160; }

    .topbar-meta {
      font-family: "Rajdhani", Arial, sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.75);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
    }

    .hero {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 90px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .hero-center {
      text-align: center;
      max-width: 860px;
    }

    .hero-title {
      font-family: "Jersey 25", Arial, sans-serif;
      font-size: clamp(84px, 12vw, 180px);
      line-height: 0.9;
      letter-spacing: 0.04em;
      color: #f6f0f0;
      text-shadow: 0 0 30px rgba(235, 81, 96, 0.08);
    }
    .hero-dot { color: #eb5160; }

    .hero-subtitle {
      margin: 20px 0 16px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #b7999c;
    }

    .hero-copy {
      margin: 0 auto 40px;
      max-width: 520px;
      font-family: "Rajdhani", Arial, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 1.6;
      color: #d2c2c6;
    }

    .primary-btn {
      appearance: none;
      display: inline-block;
      border: 1px solid rgba(235, 81, 96, 0.26);
      background: rgba(235, 81, 96, 0.14);
      color: #fff;
      padding: 14px 24px;
      min-width: 200px;
      border-radius: 999px;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 8px 28px rgba(235, 81, 96, 0.18);
      text-align: center;
    }
    .primary-btn:hover {
      transform: translateY(-1px);
      background: rgba(235, 81, 96, 0.22);
    }

    .helper-text {
      margin-top: 18px;
      font-family: "Rajdhani", Arial, sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: #b7999c;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <header class="topbar">
    <div class="brand-btn"><div class="brand">BETTR<span class="brand-dot">.</span></div></div>
    <div class="topbar-meta">Decision Interface</div>
  </header>

  <main class="hero">
    <div class="hero-center">
      <h1 class="hero-title">BETTR<span class="hero-dot">.</span></h1>
      <p class="hero-subtitle">An AI Decision Interface</p>
      <p class="hero-copy">A speculative experience about optimisation, agency, and what we give away willingly.</p>
      <button class="primary-btn" id="enter-btn">Enter</button>
      <p class="helper-text">Begin when ready. The system is already recording.</p>
    </div>
  </main>

  <script>
    document.getElementById("enter-btn").addEventListener("click", () => {
      window.location.href = "Assessment/index.html";
    });
  </script>
</body>
</html>
